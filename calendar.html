<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0c0c0c" id="theme-meta">
<title>Calendario — Trading Dashboard</title>
<style>
:root[data-theme="dark"]{
  --bg:#0c0c0c;--surface:#161616;--surface2:#1e1e1e;--border:#2a2a2a;
  --green:#4ade80;--green-bg:#0f1f0f;--green-br:#1a3a1a;
  --acc:#f59e0b;--acc-bg:#1a1200;--acc-br:#3a2800;--acc-soft:#181200;
  --acc-faded:#7a5a1a;--acc-faded-bg:#1a1400;--acc-faded-br:#2e2200;
  --red:#ef4444;--red-bg:#1c0808;--red-br:#5a1a1a;--red-soft:#1a0808;
  --blue:#60a5fa;--blue-bg:#0a1220;--blue-br:#1e3a5a;--blue-soft:#0a1418;
  --text:#e8e8e0;--muted:#777;--faint:#444;--toggle-bg:#1e1e1e;
  --past-bg:#111;--past-border:#1e1e1e;--past-text:#444;
}
:root[data-theme="light"]{
  --bg:#f2f2f7;--surface:#fff;--surface2:#e8e8ed;--border:#d1d1d6;
  --green:#16a34a;--green-bg:#f0fdf4;--green-br:#bbf7d0;
  --acc:#d97706;--acc-bg:#fffbeb;--acc-br:#fde68a;--acc-soft:#fffdf5;
  --acc-faded:#c4892a;--acc-faded-bg:#fef9ee;--acc-faded-br:#fde8aa;
  --red:#dc2626;--red-bg:#fef2f2;--red-br:#fecaca;--red-soft:#fff5f5;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-br:#bfdbfe;--blue-soft:#f0f7ff;
  --text:#1c1c1e;--muted:#6b6b6b;--faint:#aeaeb2;--toggle-bg:#e5e5ea;
  --past-bg:#f5f5f7;--past-border:#e5e5ea;--past-text:#b0b0b8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px;background:var(--bg);transition:background .2s}
body{font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top,0);transition:background .2s,color .2s}
.app-header{padding:14px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:10}
.header-logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;border-radius:8px;background:var(--green-bg);border:1.5px solid var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:18px;height:18px}
.header-text .title{font-size:17px;font-weight:700;letter-spacing:-.4px}
.header-text .sub{font-size:11px;color:var(--muted);margin-top:1px}
.theme-toggle{width:44px;height:26px;background:var(--toggle-bg);border:1px solid var(--border);border-radius:13px;cursor:pointer;position:relative;flex-shrink:0;touch-action:manipulation}
.theme-toggle-knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:var(--text);transition:transform .2s;display:flex;align-items:center;justify-content:center;font-size:11px}
[data-theme="light"] .theme-toggle-knob{transform:translateX(18px)}
.nav-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:57px;z-index:9}
.nav-tab{flex:1;padding:11px 0;font-size:13px;font-weight:600;color:var(--muted);text-align:center;cursor:pointer;border-bottom:2px solid transparent;text-decoration:none;transition:color .15s,border-color .15s}
.nav-tab.active{color:var(--green);border-bottom-color:var(--green)}
.section-tabs{display:flex;gap:8px;padding:1
