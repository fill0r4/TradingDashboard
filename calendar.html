<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0c0c0c" id="theme-meta">
<title>Calendario — Trading Dashboard</title>
<style>
:root[data-theme="dark"]{
  --bg:#0c0c0c;--surface:#161616;--surface2:#1e1e1e;--border:#2a2a2a;
  --green:#4ade80;--green-bg:#0f1f0f;--green-br:#1a3a1a;
  --acc:#f59e0b;--acc-bg:#1a1200;--acc-br:#3a2800;--acc-soft:#181200;
  --acc-faded:#7a5a1a;--acc-faded-bg:#1a1400;--acc-faded-br:#2e2200;
  --red:#ef4444;--red-bg:#1c0808;--red-br:#5a1a1a;--red-soft:#1a0808;
  --blue:#60a5fa;--blue-bg:#0a1220;--blue-br:#1e3a5a;--blue-soft:#0a1418;
  --text:#e8e8e0;--muted:#777;--faint:#444;--toggle-bg:#1e1e1e;
  --past-bg:#111;--past-border:#1e1e1e;--past-text:#444;
}
:root[data-theme="light"]{
  --bg:#f2f2f7;--surface:#fff;--surface2:#e8e8ed;--border:#d1d1d6;
  --green:#16a34a;--green-bg:#f0fdf4;--green-br:#bbf7d0;
  --acc:#d97706;--acc-bg:#fffbeb;--acc-br:#fde68a;--acc-soft:#fffdf5;
  --acc-faded:#c4892a;--acc-faded-bg:#fef9ee;--acc-faded-br:#fde8aa;
  --red:#dc2626;--red-bg:#fef2f2;--red-br:#fecaca;--red-soft:#fff5f5;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-br:#bfdbfe;--blue-soft:#f0f7ff;
  --text:#1c1c1e;--muted:#6b6b6b;--faint:#aeaeb2;--toggle-bg:#e5e5ea;
  --past-bg:#f5f5f7;--past-border:#e5e5ea;--past-text:#b0b0b8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px;background:var(--bg);transition:background .2s}
body{font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top,0);transition:background .2s,color .2s}
.app-header{padding:14px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:10}
.header-logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;border-radius:8px;background:var(--green-bg);border:1.5px solid var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:18px;height:18px}
.header-text .title{font-size:17px;font-weight:700;letter-spacing:-.4px}
.header-text .sub{font-size:11px;color:var(--muted);margin-top:1px}
.theme-toggle{width:44px;height:26px;background:var(--toggle-bg);border:1px solid var(--border);border-radius:13px;cursor:pointer;position:relative;flex-shrink:0;touch-action:manipulation}
.theme-toggle-knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:var(--text);transition:transform .2s;display:flex;align-items:center;justify-content:center;font-size:11px}
[data-theme="light"] .theme-toggle-knob{transform:translateX(18px)}
.nav-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:57px;z-index:9}
.nav-tab{flex:1;padding:11px 0;font-size:13px;font-weight:600;color:var(--muted);text-align:center;cursor:pointer;border-bottom:2px solid transparent;text-decoration:none;transition:color .15s,border-color .15s}
.nav-tab.active{color:var(--green);border-bottom-color:var(--green)}
.section-tabs{display:flex;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:98px;z-index:8}
.stab{flex:1;padding:9px 0;border-radius:10px;font-size:13px;font-weight:600;color:var(--muted);background:var(--surface2);border:none;cursor:pointer;text-align:center;touch-action:manipulation;transition:all .15s}
.stab.active{background:var(--green-bg);color:var(--green);border:1px solid var(--green)}
.controls-bar{padding:10px 16px;display:flex;flex-direction:column;gap:10px;border-bottom:1px solid var(--border);background:var(--bg)}
.week-nav{display:flex;align-items:center;justify-content:space-between;gap:8px}
.week-label{font-size:13px;font-weight:600;color:var(--text);text-align:center;flex:1}
.week-btn{background:var(--surface2);border:none;color:var(--text);font-size:17px;width:34px;height:34px;border-radius:10px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.week-btn:active{background:var(--border)}
.filter-row{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap}
.filter-label{font-size:11px;color:var(--faint);font-weight:600;letter-spacing:.07em;text-transform:uppercase;flex-shrink:0;padding-top:5px}
.filter-pills{display:flex;gap:6px;flex-wrap:wrap}
.fpill{padding:5px 11px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid;transition:all .12s;touch-action:manipulation;-webkit-user-select:none;user-select:none;opacity:.4}
.fpill.on{opacity:1}
.fpill-high{border-color:var(--red);color:var(--red)}.fpill-high.on{background:var(--red-soft)}
.fpill-medium{border-color:var(--acc);color:var(--acc)}.fpill-medium.on{background:var(--acc-soft)}
.fpill-low{border-color:var(--blue);color:var(--blue)}.fpill-low.on{background:var(--blue-soft)}
.cur-pills{display:flex;gap:5px;flex-wrap:wrap}
.cpill{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);color:var(--muted);background:transparent;transition:all .12s;touch-action:manipulation;-webkit-user-select:none;user-select:none;font-family:inherit}
.cpill.on{border-color:var(--green);color:var(--green);background:var(--green-bg)}
.scroll-body{flex:1;padding:16px 16px 40px;display:flex;flex-direction:column;max-width:560px;width:100%;margin:0 auto}
.status-box{text-align:center;padding:48px 20px;font-size:14px;color:var(--muted)}
.spinner{width:26px;height:26px;border:2.5px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.day-group{margin-bottom:8px}
.day-header{padding:14px 0 8px;display:flex;align-items:center;gap:8px}
.day-name{font-size:12px;font-weight:700;color:var(--faint);letter-spacing:.09em;text-transform:uppercase}
.day-date{font-size:13px;color:var(--muted)}
.day-today{font-size:10px;font-weight:700;background:var(--green);color:#000;padding:2px 8px;border-radius:20px;text-transform:uppercase}
[data-theme="light"] .day-today{color:#fff}
.event-card{border-radius:12px;padding:13px 14px;margin-bottom:7px;border:1px solid;border-left-width:3px}
.event-card.impact-High{background:var(--red-soft);border-color:var(--red-br);border-left-color:var(--red)}
.event-card.impact-Medium{background:var(--acc-soft);border-color:var(--acc-br);border-left-color:var(--acc)}
.event-card.impact-Low{background:var(--blue-soft);border-color:var(--blue-br);border-left-color:var(--blue)}
.event-card.past{background:var(--past-bg)!important;border-color:var(--past-border)!important;border-left-color:var(--past-border)!important;opacity:.4}
.event-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.event-time{font-size:15px;font-weight:700;letter-spacing:-.3px}
.impact-High .event-time{color:var(--red)}
.impact-Medium .event-time{color:var(--acc)}
.impact-Low .event-time{color:var(--blue)}
.past .event-time{color:var(--past-text)!important}
.event-time.allday{font-size:11px;font-weight:600;color:var(--muted)}
.event-currency{font-size:11px;font-weight:700;letter-spacing:.07em;padding:2px 7px;border-radius:5px}
.impact-High .event-currency{background:var(--red-bg);color:var(--red);border:1px solid var(--red-br)}
.impact-Medium .event-currency{background:var(--acc-bg);color:var(--acc);border:1px solid var(--acc-br)}
.impact-Low .event-currency{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-br)}
.past .event-currency{background:transparent!important;color:var(--past-text)!important;border-color:var(--past-border)!important}
.event-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.35}
.past .event-title{color:var(--past-text)}
.event-instruments{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.instr-pill{font-size:11px;font-weight:600;background:var(--acc-faded-bg);color:var(--acc-faded);border:1px solid var(--acc-faded-br);padding:2px 9px;border-radius:20px}
.instr-pill.primary{background:var(--acc-bg);color:var(--acc);border-color:var(--acc-br)}
.past .instr-pill,.past .instr-pill.primary{background:transparent;color:var(--past-text);border-color:var(--past-border)}
.error-bar{background:var(--red-bg);border:1px solid var(--red-br);border-radius:10px;padding:14px 16px;margin-bottom:12px;font-size:14px;color:var(--red);display:none;align-items:flex-start;gap:10px}
.error-bar.show{display:flex}
.refresh-row{display:flex;justify-content:center;padding:12px 0}
.refresh-btn{background:var(--surface2);border:none;color:var(--muted);font-family:inherit;font-size:13px;padding:8px 20px;border-radius:20px;cursor:pointer;touch-action:manipulation}
.refresh-btn:active{background:var(--border)}
.market-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:10px}
.market-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.market-left{display:flex;align-items:center;gap:8px}
.market-name{font-size:16px;font-weight:700;letter-spacing:-.2px}
.market-tz{font-size:11px;color:var(--muted)}
.mkt-status{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.05em;text-transform:uppercase;flex-shrink:0}
.mkt-status.open{background:var(--green-bg);color:var(--green);border:1px solid var(--green)}
.mkt-status.closed{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.market-sessions{display:flex;flex-direction:column;gap:8px}
.market-session{display:flex;justify-content:space-between;align-items:center}
.session-label{font-size:12px;color:var(--muted)}
.session-times{font-size:14px;font-weight:600;color:var(--text)}
.market-instruments{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.mkt-pill{font-size:11px;font-weight:600;background:var(--surface2);color:var(--muted);border:1px solid var(--border);padding:2px 9px;border-radius:20px}
.market-note{font-size:11px;color:var(--faint);margin-top:8px;font-style:italic}
.clock-bar{text-align:center;padding:0 0 20px}
.clock-big{font-size:36px;font-weight:800;letter-spacing:-1px;color:var(--text);font-variant-numeric:tabular-nums}
.clock-tz{font-size:12px;color:var(--muted);margin-top:3px}
</style>
</head>
<body>
<div class="app-header">
  <div class="header-logo">
    <div class="logo-icon">
      <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polyline points="1,13 5,8 8,11 12,4 17,7" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="17" cy="7" r="1.5" fill="#4ade80"/>
      </svg>
    </div>
    <div class="header-text">
      <div class="title">Trading Dashboard</div>
      <div class="sub" id="tz-sub">—</div>
    </div>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()">
    <div class="theme-toggle-knob"><span id="theme-icon">☀️</span></div>
  </button>
</div>
<div class="nav-tabs">
  <a class="nav-tab" href="index.html">Calcolatore</a>
  <a class="nav-tab active" href="calendar.html">Calendario</a>
</div>
<div class="section-tabs">
  <button class="stab active" id="stab-cal"     onclick="showSection('cal')">📅 Notizie</button>
  <button class="stab"        id="stab-markets" onclick="showSection('markets')">🏛 Borse</button>
</div>
<div class="controls-bar" id="cal-controls">
  <div class="week-nav">
    <button class="week-btn" onclick="changeWeek(-1)">‹</button>
    <span class="week-label" id="week-label">—</span>
    <button class="week-btn" onclick="changeWeek(1)">›</button>
  </div>
  <div class="filter-row">
    <span class="filter-label">Impatto</span>
    <div class="filter-pills">
      <div class="fpill fpill-high on"   id="f-High"   onclick="toggleImpact('High')">🔴 Alto</div>
      <div class="fpill fpill-medium"    id="f-Medium" onclick="toggleImpact('Medium')">🟡 Medio</div>
      <div class="fpill fpill-low"       id="f-Low"    onclick="toggleImpact('Low')">🔵 Basso</div>
    </div>
  </div>
  <div class="filter-row">
    <span class="filter-label">Valuta</span>
    <div class="cur-pills">
      <button class="cpill" data-cur="USD" onclick="toggleCur(this)">USD</button>
      <button class="cpill" data-cur="EUR" onclick="toggleCur(this)">EUR</button>
      <button class="cpill" data-cur="GBP" onclick="toggleCur(this)">GBP</button>
      <button class="cpill" data-cur="JPY" onclick="toggleCur(this)">JPY</button>
      <button class="cpill" data-cur="AUD" onclick="toggleCur(this)">AUD</button>
      <button class="cpill" data-cur="CAD" onclick="toggleCur(this)">CAD</button>
      <button class="cpill" data-cur="CHF" onclick="toggleCur(this)">CHF</button>
      <button class="cpill" data-cur="NZD" onclick="toggleCur(this)">NZD</button>
    </div>
  </div>
</div>
<div id="section-cal">
  <div class="scroll-body">
    <div class="error-bar" id="err-bar">
      <span style="font-size:18px;flex-shrink:0">⚠</span>
      <div><div style="font-weight:600;margin-bottom:3px">Errore caricamento</div><div id="err-msg" style="font-size:13px;opacity:.8"></div></div>
    </div>
    <div id="cal-body"><div class="status-box"><div class="spinner"></div>Caricamento…</div></div>
    <div class="refresh-row"><button class="refresh-btn" onclick="loadCalendar()">↺ Aggiorna</button></div>
  </div>
</div>
<div id="section-markets" style="display:none">
  <div class="scroll-body">
    <div class="clock-bar">
      <div class="clock-big" id="mkt-clock">—</div>
      <div class="clock-tz" id="mkt-tz">—</div>
    </div>
    <div id="markets-body">—</div>
  </div>
</div>
<script>
'use strict';

// ─── TIMEZONE ───────────────────────────────────────────────────────────────
var USER_TZ = 'Europe/Rome';
try { USER_TZ = Intl.DateTimeFormat().resolvedOptions().timeZone || USER_TZ; } catch(e) {}
document.getElementById('tz-sub').textContent = USER_TZ.replace(/_/g, ' ');

// ─── THEME ──────────────────────────────────────────────────────────────────
(function() {
  var t = 'dark';
  try { t = localStorage.getItem('theme') || t; } catch(e) {}
  applyTheme(t);
})();
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-icon').textContent = t === 'dark' ? '☀️' : '🌙';
  try { document.getElementById('theme-meta').setAttribute('content', t==='dark'?'#0c0c0c':'#f2f2f7'); } catch(e) {}
  try { localStorage.setItem('theme', t); } catch(e) {}
}
function toggleTheme() {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

// ─── SECTION ────────────────────────────────────────────────────────────────
var _mktInterval = null;
function showSection(sec) {
  document.getElementById('section-cal').style.display     = sec==='cal'?'':'none';
  document.getElementById('section-markets').style.display = sec==='markets'?'':'none';
  document.getElementById('cal-controls').style.display    = sec==='cal'?'':'none';
  document.getElementById('stab-cal').className     = 'stab'+(sec==='cal'?' active':'');
  document.getElementById('stab-markets').className = 'stab'+(sec==='markets'?' active':'');
  if (sec === 'markets') startMarkets();
  else { clearInterval(_mktInterval); _mktInterval = null; }
}

// ─── FILTERS ────────────────────────────────────────────────────────────────
var activeImpacts = { High: true, Medium: false, Low: false };
var activeCurrencies = {};
function toggleImpact(imp) {
  var on = Object.keys(activeImpacts).filter(function(k){ return activeImpacts[k]; });
  if (activeImpacts[imp] && on.length === 1) return;
  activeImpacts[imp] = !activeImpacts[imp];
  document.getElementById('f-'+imp).classList.toggle('on', activeImpacts[imp]);
  renderFromCache();
}
function toggleCur(el) {
  var c = el.getAttribute('data-cur');
  activeCurrencies[c] ? delete activeCurrencies[c] : (activeCurrencies[c] = true);
  el.classList.toggle('on', !!activeCurrencies[c]);
  renderFromCache();
}

// ─── WEEK ───────────────────────────────────────────────────────────────────
var weekOffset = 0, cachedEvents = [];
function changeWeek(d) { weekOffset += d; loadCalendar(); }
function getWeekBounds(off) {
  var n=new Date(), day=n.getDay();
  var mon=new Date(n); mon.setDate(n.getDate()-(day===0?6:day-1)+off*7); mon.setHours(0,0,0,0);
  var sun=new Date(mon); sun.setDate(mon.getDate()+6); sun.setHours(23,59,59,999);
  return { monday:mon, sunday:sun };
}
function fmtWeekLabel(mon, sun) {
  var l=navigator.language||'it-IT', o={day:'numeric',month:'short'};
  try { return mon.toLocaleDateString(l,o)+' – '+sun.toLocaleDateString(l,Object.assign({},o,{year:'numeric'})); }
  catch(e) { return mon.toDateString()+' – '+sun.toDateString(); }
}

// ─── TIME CONVERSION ────────────────────────────────────────────────────────

// Ottiene i dettagli dell'orario in modo chirurgico per evitare i bug di Safari
function getHourInfoInTz(tz, dateObj) {
  var d = dateObj || new Date();
  var parts = new Intl.DateTimeFormat('en-US', { timeZone: tz, weekday: 'short', hour: 'numeric', minute: 'numeric', hour12: false }).formatToParts(d);
  var wd = '', h = 0, m = 0, ap = '';
  parts.forEach(function(p) {
    if (p.type === 'weekday') wd = p.value;
    if (p.type === 'hour') h = parseInt(p.value, 10);
    if (p.type === 'minute') m = parseInt(p.value, 10);
    if (p.type === 'dayPeriod') ap = p.value.toLowerCase();
  });
  if (h === 24) h = 0;
  if (ap === 'pm' && h < 12) h += 12;
  if (ap === 'am' && h === 12) h = 0;
  return { wd: wd, h: h, m: m };
}

function parseFFTime(dateStr, timeStr) {
  try {
    var ts = (timeStr||'').trim();
    if (!ts || ts==='All Day' || ts==='Tentative') return { utcDate:null, isAllDay:true };

    var dp = (dateStr||'').split('-');
    if (dp.length !== 3) return { utcDate:null, isAllDay:false };
    var mo=parseInt(dp[0],10), da=parseInt(dp[1],10), yr=parseInt(dp[2],10);

    var tm = ts.match(/^(\d{1,2}):(\d{2})\s*(am|pm)$/i);
    if (!tm) return { utcDate:null, isAllDay:false };
    var h=parseInt(tm[1],10), min=parseInt(tm[2],10), ap=tm[3].toLowerCase();
    if (ap==='pm' && h!==12) h+=12;
    if (ap==='am' && h===12) h=0;

    // FIX 1: L'API Vercel scarica i dati già in UTC. Nessuna sottrazione necessaria!
    var utcMs = Date.UTC(yr, mo-1, da, h, min, 0);
    return { utcDate: new Date(utcMs), isAllDay: false };
  } catch(e) {
    return { utcDate:null, isAllDay:false };
  }
}

function fmtLocal(utcDate) {
  if (!utcDate || isNaN(utcDate.getTime())) return '—';
  try {
    return new Intl.DateTimeFormat(navigator.language||'it-IT', {
      timeZone: USER_TZ, hour:'2-digit', minute:'2-digit', hour12:false
    }).format(utcDate);
  } catch(e) {
    return String(utcDate.getHours()).padStart(2,'0')+':'+String(utcDate.getMinutes()).padStart(2,'0');
  }
}

// ─── FETCH ──────────────────────────────────────────────────────────────────
async function fetchFF(week) {
  var res = await fetch('https://lotcal-api.vercel.app/api/calendar?week='+week, {cache:'no-store'});
  if (!res.ok) throw new Error('HTTP '+res.status);
  var txt = await res.text();
  if (!txt||!txt.trim()) throw new Error('Risposta vuota');
  return txt;
}
function parseXML(xml) {
  try {
    var doc = new DOMParser().parseFromString(xml,'text/xml');
    if (doc.querySelector('parsererror')) return [];
    return Array.from(doc.querySelectorAll('event')).map(function(e) {
      return {
        date:    (e.querySelector('date')?.textContent||'').trim(),
        time:    (e.querySelector('time')?.textContent||'').trim(),
        currency:(e.querySelector('currency')?.textContent||'').trim().toUpperCase(),
        title:   (e.querySelector('title')?.textContent||'').trim(),
        impact:  (e.querySelector('impact')?.textContent||'').trim(),
      };
    }).filter(function(e){ return e.date && ['High','Medium','Low'].includes(e.impact); });
  } catch(e) { return []; }
}



// ─── RENDER NEWS ────────────────────────────────────────────────────────────
var DN=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
var MN=['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];

function renderFromCache() {
  var body=document.getElementById('cal-body');
  if (!cachedEvents.length) { body.innerHTML='<div class="status-box">Nessun evento. Premi Aggiorna.</div>'; return; }
  var bounds=getWeekBounds(weekOffset);
  var curActive=Object.keys(activeCurrencies).length>0;
  var filtered=cachedEvents.filter(function(ev){
    if(!activeImpacts[ev.impact]) return false;
    if(curActive && !activeCurrencies[ev.currency.toUpperCase()]) return false;
    var dp=(ev.date||'').split('-');
    if(dp.length!==3) return false;
    var dt=new Date(parseInt(dp[2],10),parseInt(dp[0],10)-1,parseInt(dp[1],10));
    return dt>=bounds.monday && dt<=bounds.sunday;
  });
  if(!filtered.length){body.innerHTML='<div class="status-box">Nessun evento con i filtri selezionati.</div>';return;}

  var groups={};
  filtered.forEach(function(ev){
    var p=parseFFTime(ev.date,ev.time);
    if(!groups[ev.date]) groups[ev.date]=[];
    groups[ev.date].push(Object.assign({},ev,{utcDate:p.utcDate,isAllDay:p.isAllDay}));
  });

  var keys=Object.keys(groups).sort(function(a,b){
    var ap=a.split('-'),bp=b.split('-');
    return new Date(+ap[2],+ap[0]-1,+ap[1])-new Date(+bp[2],+bp[0]-1,+bp[1]);
  });

  var now=new Date(), html='';
  keys.forEach(function(key){
    var dp=key.split('-'), mo=+dp[0], da=+dp[1], yr=+dp[2];
    var dt=new Date(yr,mo-1,da);
    var isToday=dt.toDateString()===now.toDateString();
    html+='<div class="day-group"><div class="day-header">'
      +'<span class="day-name">'+(DN[dt.getDay()]||'')+'</span>'
      +'<span class="day-date">'+da+' '+(MN[mo-1]||'')+' '+yr+'</span>'
      +(isToday?'<span class="day-today">Oggi</span>':'')
      +'</div>';
    groups[key].slice().sort(function(a,b){
      if(!a.utcDate)return -1; if(!b.utcDate)return 1; return a.utcDate-b.utcDate;
    }).forEach(function(ev){
      var t=ev.isAllDay?'All Day':fmtLocal(ev.utcDate);
      var past=!ev.isAllDay&&ev.utcDate&&ev.utcDate<now;
      html+='<div class="event-card impact-'+ev.impact+(past?' past':'')+'"><div class="event-top">'
        +'<span class="event-time'+(ev.isAllDay?' allday':'')+'">'+(t)+'</span>'
        +'<span class="event-currency">'+ev.currency+'</span></div>'
        +'<div class="event-title">'+ev.title+'</div>'
        +'</div>';
    });
    html+='</div>';
  });
  body.innerHTML=html;
}

// ─── LOAD ───────────────────────────────────────────────────────────────────
async function loadCalendar() {
  var bounds=getWeekBounds(weekOffset);
  document.getElementById('week-label').textContent=fmtWeekLabel(bounds.monday,bounds.sunday);
  document.getElementById('err-bar').classList.remove('show');
  document.getElementById('cal-body').innerHTML='<div class="status-box"><div class="spinner"></div>Caricamento…</div>';
  if(weekOffset<0||weekOffset>1){
    document.getElementById('cal-body').innerHTML='<div class="status-box">Forex Factory fornisce solo settimana corrente e prossima.</div>';
    return;
  }
  try {
    var xml=await fetchFF(weekOffset===1?'next':'this');
    cachedEvents=parseXML(xml);
    renderFromCache();
  } catch(err) {
    document.getElementById('cal-body').innerHTML='';
    document.getElementById('err-msg').textContent=err.message||'Errore sconosciuto';
    document.getElementById('err-bar').classList.add('show');
  }
}

// FIX 2: Usa formatToParts per evitare che Safari scambi la data (5/12) per i minuti!
function isMarketOpen(mkt) {
  var info = getHourInfoInTz(mkt.tz);
  if (info.wd === 'Sat' || info.wd === 'Sun') return false;

  var currentMinutes = info.h * 60 + info.m;

  for (var i=0; i<mkt.sessions.length; i++) {
    var s = mkt.sessions[i];
    var openMinutes = s.open[0] * 60 + s.open[1];
    var closeMinutes = s.close[0] * 60 + s.close[1];
    if (currentMinutes >= openMinutes && currentMinutes < closeMinutes) return true;
  }
  return false;
}

function wallToUserDisplay(tz, h, m) {
  var hMkt = getHourInfoInTz(tz).h;
  var hUsr = getHourInfoInTz(USER_TZ).h;
  
  var diff = hUsr - hMkt;
  if (diff < -12) diff += 24;
  if (diff > 12) diff -= 24;
  
  var localH = h + diff;
  if (localH >= 24) localH -= 24;
  if (localH < 0) localH += 24;
  
  return String(localH).padStart(2, '0') + ':' + String(m).padStart(2, '0');
}

function renderMarketsHTML() {
  var html='';
  MKTS.forEach(function(mkt){
    var open = isMarketOpen(mkt);
    html+='<div class="market-card"><div class="market-header"><div class="market-left">'
      +'<span style="font-size:22px">'+mkt.flag+'</span>'
      +'<div><div class="market-name">'+mkt.name+'</div>'
      +'<div class="market-tz">'+mkt.tz.replace(/_/g,' ')+'</div></div></div>'
      +'<span class="mkt-status '+(open?'open':'closed')+'">'+(open?'Aperta':'Chiusa')+'</span>'
      +'</div><div class="market-sessions">';
    mkt.sessions.forEach(function(s){
      html+='<div class="market-session"><span class="session-label">'+s.label+'</span>'
        +'<span class="session-times">'+wallToUserDisplay(mkt.tz,s.open[0],s.open[1])
        +' – '+wallToUserDisplay(mkt.tz,s.close[0],s.close[1])+'</span></div>';
    });
    html+='</div><div class="market-instruments">';
    mkt.instrs.forEach(function(i){html+='<span class="mkt-pill">'+i+'</span>';});
    html+='</div>'+(mkt.note?'<div class="market-note">'+mkt.note+'</div>':'')+'</div>';
  });
  return html;
}

function startMarkets() {
  clearInterval(_mktInterval);
  var tzEl=document.getElementById('mkt-tz');
  tzEl.textContent = USER_TZ.replace(/_/g,' ');

  function tick() {
    document.getElementById('mkt-clock').textContent = new Intl.DateTimeFormat(
      navigator.language||'it-IT',{timeZone:USER_TZ,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}
    ).format(new Date());
    if (tick._counter % 60 === 0) {
      document.getElementById('markets-body').innerHTML = renderMarketsHTML();
    }
    tick._counter++;
  }
  tick._counter = 0;
  document.getElementById('markets-body').innerHTML = renderMarketsHTML();
  tick();
  _mktInterval = setInterval(tick, 1000);
}
